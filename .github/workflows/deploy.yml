name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate DiscordSRV config from template
        shell: bash
        run: |
          set -euo pipefail
          
          FILENAME="server/plugins/DiscordSRV/config.yml"
          
          sed -i 's|__DISCORDSRV_BOT_TOKEN__|${{ secrets.DISCORDSRV_BOT_TOKEN }}|g' "$FILENAME"
          sed -i 's|__DISCORD_CHANNEL_ID__|${{ secrets.DISCORD_CHANNEL_ID }}|g' "$FILENAME"
          sed -i 's|__DISCORD_CONSOLE_CHANNEL_ID__|${{ secrets.DISCORD_CONSOLE_CHANNEL_ID }}|g' "$FILENAME"
        
      - name: Deploy files via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.MINECRAFT_HOST }}
          username: ${{ secrets.MINECRAFT_USER }}
          key: ${{ secrets.MINECRAFT_KEY }}
          port: ${{ secrets.MINECRAFT_PORT }}
          uploads: |
            ./ => ${{ secrets.MINECRAFT_TARGET_DIR }}
          ignore: |
            .git/
            .github/
            .gitignore

      - name: Compile Spigot
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MINECRAFT_HOST }}
          username: ${{ secrets.MINECRAFT_USER }}
          key: ${{ secrets.MINECRAFT_KEY }}
          port: ${{ secrets.MINECRAFT_PORT }}
          script: |
            set -e

            cd "${{ secrets.MINECRAFT_TARGET_DIR }}/buildtools"

            SPIGOT_VERSION=1.21.11

            find . -mindepth 1 -maxdepth 1 \
              ! -name BuildTools.jar \
              -exec rm -rf {} +

            wget -O BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
            java -jar BuildTools.jar --rev "$SPIGOT_VERSION"

            cp "spigot-${SPIGOT_VERSION}.jar" ../server/spigot.jar

      - name: Install plugins
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MINECRAFT_HOST }}
          username: ${{ secrets.MINECRAFT_USER }}
          key: ${{ secrets.MINECRAFT_KEY }}
          port: ${{ secrets.MINECRAFT_PORT }}
          script: |
            set -e
            
            SERVER_FOLDER="${{ secrets.MINECRAFT_TARGET_DIR }}/server"
            
            PLUGINS=(
              "EssentialsX.jar|https://github.com/EssentialsX/Essentials/releases/download/2.21.2/EssentialsX-2.21.2.jar"
              "LuckPerms.jar|https://download.luckperms.net/1631/bukkit/loader/LuckPerms-Bukkit-5.5.42.jar"
              "BlueMap.jar|https://github.com/BlueMap-Minecraft/BlueMap/releases/download/v5.18/bluemap-5.18-spigot.jar"
              "DiscordSRV.jar|https://download.discordsrv.com/v2/DiscordSRV/DiscordSRV/release/download/v1.30.4/DiscordSRV-Build-1.30.4.jar"
              "Plan.jar|https://github.com/plan-player-analytics/Plan/releases/download/5.7.3306/Plan-5.7-build-3306.jar"
              "ClansLite.jar|https://hangarcdn.papermc.io/plugins/Loving11ish/ClansLite/versions/1.6.3/PAPER/ClansLite-1.6.3.jar"
              "PvPManager.jar|https://cdn.modrinth.com/data/1Ffl2uIq/versions/OhJOp27l/PvPManager.jar"
              "ViaBackwards.jar|https://hangarcdn.papermc.io/plugins/ViaVersion/ViaBackwards/versions/5.8.1/PAPER/ViaBackwards-5.8.1.jar"
              "ViaVersions.jar|https://ci.viaversion.com/job/ViaVersion/1349/artifact/build/libs/ViaVersion-5.8.1.jar"
              "SetHome.jar|https://cdn.modrinth.com/data/1apsbntF/versions/12w6NDCz/SetHome-6.1.jar"
              "Geyser-Spigot.jar|https://download.geysermc.org/v2/projects/geyser/versions/2.9.5/builds/1110/downloads/spigot"
              "floodgate-spigot.jar|https://download.geysermc.org/v2/projects/floodgate/versions/2.2.5/builds/131/downloads/spigot"
              "FoxAddition.jar|https://cdn.modrinth.com/data/q9Lcd0FU/versions/2BMx3SKk/FoxAddition.jar"
            )

            # Stop server
            systemctl --user stop minecraft

            # Create plugin folder if not existing
            mkdir -p "$SERVER_FOLDER/plugins"

            # Remove all old plugins
            rm $SERVER_FOLDER/plugins/*.jar

            cd "$SERVER_FOLDER/plugins"

            # Download plugins
            for entry in "${PLUGINS[@]}"; do
              IFS="|" read -r name url <<< "$entry"
              wget -O "$name" "$url"
            done

      - name: Create systemd user service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MINECRAFT_HOST }}
          username: ${{ secrets.MINECRAFT_USER }}
          key: ${{ secrets.MINECRAFT_KEY }}
          port: ${{ secrets.MINECRAFT_PORT }}
          script: |
            set -e
            export XDG_RUNTIME_DIR=/run/user/$(id -u)

            mkdir -p ~/.config/systemd/user

            cat > ~/.config/systemd/user/minecraft.service <<EOL
            [Unit]
            Description=Minecraft Server
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/home/${{ secrets.MINECRAFT_USER }}/${{ secrets.MINECRAFT_TARGET_DIR }}/server
            ExecStart=/bin/bash /home/${{ secrets.MINECRAFT_USER }}/${{ secrets.MINECRAFT_TARGET_DIR }}/server/spigotstart.sh
            Restart=on-failure
            RestartSec=10

            [Install]
            WantedBy=default.target
            EOL

            systemctl --user daemon-reload
            systemctl --user disable minecraft || true
            rm -f ~/.config/systemd/user/default.target.wants/minecraft.service
            systemctl --user enable minecraft
            loginctl enable-linger "$USER" || true
            systemctl --user restart minecraft || systemctl --user start minecraft
            systemctl --user status minecraft --no-pager
